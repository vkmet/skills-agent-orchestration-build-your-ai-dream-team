<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Project Pulse</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="dashboard">
      <header class="dashboard-header">
        <div>
          <h1 class="dashboard-title">Project Pulse</h1>
          <p class="dashboard-subtitle">
            Track project health at a glance, including status, priority, and the latest activity.
          </p>
        </div>
      </header>

      <section id="project-grid" class="project-grid" aria-live="polite"></section>
    </main>

    <script>
      (function () {
        var grid = document.getElementById("project-grid");

        function toClassSuffix(value) {
          return String(value || "")
            .trim()
            .toLowerCase()
            .replace(/[^a-z0-9]+/g, "-")
            .replace(/^-+|-+$/g, "");
        }

        function createBadge(baseClass, value) {
          var badge = document.createElement("span");
          var suffix = toClassSuffix(value);
          badge.className = "badge " + baseClass + (suffix ? " " + baseClass + "--" + suffix : "");
          badge.textContent = value || "Unknown";
          return badge;
        }

        function renderMessage(title, details) {
          grid.innerHTML = "";

          var card = document.createElement("article");
          card.className = "project-card";

          var heading = document.createElement("h2");
          heading.textContent = title;

          var detail = document.createElement("p");
          detail.className = "project-summary";
          detail.textContent = details;

          card.appendChild(heading);
          card.appendChild(detail);
          grid.appendChild(card);
        }

        function isValidProject(project) {
          return (
            project &&
            typeof project.name === "string" &&
            typeof project.owner === "string" &&
            typeof project.status === "string" &&
            typeof project.recentActivity === "string" &&
            typeof project.priority === "string"
          );
        }

        function renderProjects(projects) {
          grid.innerHTML = "";

          projects.forEach(function (project) {
            var card = document.createElement("article");
            card.className = "project-card";

            var title = document.createElement("h2");
            title.textContent = project.name;

            var meta = document.createElement("div");
            meta.className = "project-meta";
            meta.appendChild(createBadge("status", project.status));
            meta.appendChild(createBadge("priority", project.priority));

            var activity = document.createElement("p");
            activity.className = "recentActivity";

            var activityLabel = document.createElement("strong");
            activityLabel.textContent = "Recent Activity:";
            activity.appendChild(activityLabel);
            activity.appendChild(document.createTextNode(" " + project.recentActivity));

            var footer = document.createElement("div");
            footer.className = "project-footer";

            var ownerLabel = document.createElement("span");
            ownerLabel.className = "metric";
            ownerLabel.textContent = "Owner";

            var ownerValue = document.createElement("span");
            ownerValue.className = "metric-value";
            ownerValue.textContent = project.owner;

            footer.appendChild(ownerLabel);
            footer.appendChild(ownerValue);

            card.appendChild(title);
            card.appendChild(meta);
            card.appendChild(activity);
            card.appendChild(footer);
            grid.appendChild(card);
          });
        }

        fetch("project-data.json", { cache: "no-store" })
          .then(function (response) {
            if (!response.ok) {
              throw new Error("Request failed with status " + response.status);
            }
            return response.json();
          })
          .then(function (payload) {
            if (!payload || !Array.isArray(payload.projects)) {
              renderMessage(
                "Data unavailable",
                "Project data format is invalid. Expected a top-level projects array."
              );
              return;
            }

            var validProjects = payload.projects.filter(isValidProject);

            if (validProjects.length === 0) {
              renderMessage(
                "No projects found",
                "There are no valid project records to display right now."
              );
              return;
            }

            renderProjects(validProjects);
          })
          .catch(function () {
            renderMessage(
              "Unable to load project data",
              "Please confirm that project-data.json is available and valid JSON."
            );
          });
      })();
    </script>
  </body>
</html>
